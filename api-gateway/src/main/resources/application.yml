server:
  port: 8083

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/user-service/**
          filters:
            - StripPrefix=2
            - AddRequestHeader=X-Gateway-Source, gateway

        - id: notification-service-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/notification-service/**
          filters:
            - StripPrefix=2

management:
  endpoints:
    web:
      exposure:
        include: "health,info,gateway,routes"
  endpoint:
    gateway:
      enabled: true